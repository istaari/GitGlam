<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitGlam</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-logo">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span>GitGlam</span>
      </div>
      <label class="toggle-switch" id="masterToggle">
        <input type="checkbox" id="enableToggle">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- No markdown notice -->
    <div class="popup-notice" id="noMarkdownNotice" style="display:none;">
      <p>No markdown content detected on this page.</p>
    </div>

    <!-- Settings -->
    <div class="popup-section" id="settingsSection">
      <!-- Theme Picker -->
      <div class="section-label">Theme</div>
      <div class="theme-grid" id="themeGrid">
        <button class="theme-card" data-theme="medium">
          <div class="theme-preview theme-preview-medium">
            <div class="tp-line tp-h"></div>
            <div class="tp-line tp-p"></div>
            <div class="tp-line tp-p tp-short"></div>
          </div>
          <span>Medium</span>
        </button>
        <button class="theme-card" data-theme="notion">
          <div class="theme-preview theme-preview-notion">
            <div class="tp-line tp-h"></div>
            <div class="tp-line tp-p"></div>
            <div class="tp-line tp-p tp-short"></div>
          </div>
          <span>Notion</span>
        </button>
        <button class="theme-card" data-theme="sepia">
          <div class="theme-preview theme-preview-sepia">
            <div class="tp-line tp-h"></div>
            <div class="tp-line tp-p"></div>
            <div class="tp-line tp-p tp-short"></div>
          </div>
          <span>Sepia</span>
        </button>
        <button class="theme-card" data-theme="nord">
          <div class="theme-preview theme-preview-nord">
            <div class="tp-line tp-h"></div>
            <div class="tp-line tp-p"></div>
            <div class="tp-line tp-p tp-short"></div>
          </div>
          <span>Nord</span>
        </button>
      </div>

      <!-- Feature Toggles -->
      <div class="section-label">Features</div>
      <div class="feature-list">
        <label class="feature-item">
          <span class="feature-name">Focus Mode</span>
          <input type="checkbox" id="focusModeToggle" class="feature-checkbox">
          <span class="feature-slider"></span>
        </label>
        <label class="feature-item">
          <span class="feature-name">Progress Bar</span>
          <input type="checkbox" id="progressBarToggle" class="feature-checkbox">
          <span class="feature-slider"></span>
        </label>
        <label class="feature-item">
          <span class="feature-name">Reading Time</span>
          <input type="checkbox" id="readingTimeToggle" class="feature-checkbox">
          <span class="feature-slider"></span>
        </label>
        <label class="feature-item">
          <span class="feature-name">Scroll Animations</span>
          <input type="checkbox" id="animationsToggle" class="feature-checkbox">
          <span class="feature-slider"></span>
        </label>
        <div class="feature-item font-resizer-item">
          <span class="feature-name">Font Size <span class="font-size-badge" id="fontSizeValue">16px</span></span>
          <div class="font-size-slider-row">
            <span class="font-size-label font-size-label-sm">A</span>
            <input type="range" id="fontSizeRange" class="font-size-range" min="12" max="24" step="1" value="16">
            <span class="font-size-label font-size-label-lg">A</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Keyboard shortcuts -->
    <div class="popup-footer">
      <span class="shortcut"><kbd>Alt</kbd>+<kbd>R</kbd> Toggle</span>
      <span class="shortcut"><kbd>Esc</kbd> Exit</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
